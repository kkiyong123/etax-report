spring.application.name=etax-report
server.port=8080
spring.datasource.url=jdbc:postgresql://${DB_HOST:etax-pgcluster-pgbouncer}:${DB_PORT:5432}/${DB_NAME:etaxdb}
spring.datasource.username=${DB_USER:etaxuser}
spring.datasource.password=${DB_PASSWORD:etax@DB2026}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
logging.level.lk.gov.ird.etax=INFO
